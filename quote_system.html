<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS 航空級規格化報價系統 V2.1</title>
    <style>
        :root {
            --sky-blue: #00BFFF;
            --yellow-green: #9ACD32;
            --bg-color: #f4f9fc;
            --card-shadow: 0 12px 40px rgba(0,0,0,0.08);
        }

        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: #333;
        }

        .quote-card {
            max-width: 650px;
            margin: 0 auto;
            background: #fff;
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
            border-top: 12px solid var(--sky-blue);
        }

        header {
            padding: 30px;
            text-align: center;
            background: linear-gradient(135deg, #fff 0%, #eef9ff 100%);
        }

        .brand-title {
            font-size: 1.8rem;
            color: var(--sky-blue);
            font-weight: 800;
            margin: 0;
            letter-spacing: 3px;
        }

        .timestamp {
            font-size: 0.85rem;
            color: #888;
            margin-top: 10px;
        }

        .section {
            padding: 25px;
            border-bottom: 1px solid #f0f4f7;
        }

        .section-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-icon {
            font-size: 1.5rem;
            margin-right: 15px;
            width: 45px;
            height: 45px;
            background: #f0f7ff;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .section-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: #444;
        }

        .hours-display {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--sky-blue);
            text-align: center;
            margin-bottom: 5px;
        }

        .grid-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .option-item {
            background: #f9fbfd;
            border: 2px solid #edf2f6;
            border-radius: 15px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: center;
        }

        .option-item.active {
            border-color: var(--yellow-green);
            background: #fdfdf0;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(154,205,50,0.15);
        }

        .option-name { font-weight: 600; display: block; margin-bottom: 5px; }
        .option-price { font-size: 0.85rem; color: var(--yellow-green); font-weight: 700; }

        .extra-form { display: flex; gap: 10px; margin-top: 10px; }

        input, select, textarea {
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            padding: 12px;
            font-size: 0.95rem;
            width: 100%;
            box-sizing: border-box;
        }

        .summary-panel {
            background: linear-gradient(135deg, var(--sky-blue) 0%, #0099cc 100%);
            padding: 35px;
            color: white;
            text-align: center;
        }

        .total-amount { font-size: 3rem; font-weight: 800; margin: 10px 0; }

        canvas {
            border: 2px dashed #cbd5e0;
            border-radius: 15px;
            background: #fff;
            width: 100%;
            height: 180px;
            touch-action: none;
        }

        .btn-group { padding: 25px; display: flex; gap: 15px; }
        .btn { flex: 1; padding: 16px; border: none; border-radius: 14px; font-weight: 700; cursor: pointer; }
        .btn-clear { background: #edf2f7; color: #4a5568; }
        .btn-pdf { background: var(--yellow-green); color: white; }
    </style>
</head>
<body>

<div class="quote-card">
    <header>
        <div class="brand-title">CLEANING CMS</div>
        <div class="timestamp" id="current-time">系統初始化中...</div>
    </header>

    <!-- 1. 點工 -->
    <div class="section">
        <div class="section-header">
            <div class="section-icon">👨‍🔧</div>
            <div class="section-title">點工 (時數與頻率)</div>
        </div>
        <div class="hours-display"><span id="hr-val">4</span> 小時</div>
        <input type="range" id="hours-slider" min="1" max="12" step="0.5" value="4" oninput="calculate()">
        <div style="display:flex; justify-content:space-between; font-size:0.8rem; color:#888; margin: 10px 0;">
            <span id="rate-note">正在抓取定價...</span>
            <span>(階梯式折扣)</span>
        </div>
        <select id="freq" onchange="calculate()">
            <option value="1">單次服務 (原價)</option>
            <option value="0.95">雙週定期 (95折)</option>
            <option value="0.85">每週定期 (85折)</option>
        </select>
    </div>

    <!-- 2. 點料 -->
    <div class="section">
        <div class="section-header">
            <div class="section-icon">🧪</div>
            <div class="section-title">點料 (專項耗材)</div>
        </div>
        <div class="grid-options" id="mat-grid">
            <div style="grid-column: 1/-1; text-align: center; color: #999;">等待定價數據抓取...</div>
        </div>
    </div>

    <!-- 3. 點設備 -->
    <div class="section">
        <div class="section-header">
            <div class="section-icon">⚙️</div>
            <div class="section-title">點設備 (專業機具)</div>
        </div>
        <div class="grid-options" id="equip-grid">
             <div style="grid-column: 1/-1; text-align: center; color: #999;">等待定價數據抓取...</div>
        </div>
    </div>

    <!-- 4. 追加 -->
    <div class="section">
        <div class="section-header">
            <div class="section-icon">➕</div>
            <div class="section-title">現場臨時追加項</div>
        </div>
        <div class="extra-form">
            <input type="text" id="extra-name" placeholder="追加原因 (如：超重度髒污)" style="flex:2">
            <input type="number" id="extra-price" placeholder="金額" style="flex:1" oninput="calculate()">
        </div>
    </div>

    <div class="summary-panel">
        <div style="font-size:0.9rem; opacity:0.9;">規格報價預算 (NTD)</div>
        <div class="total-amount" id="total-price">$0</div>
        <div id="status-tag" style="font-size:0.8rem; border:1px solid rgba(255,255,255,0.4); display:inline-block; padding:4px 12px; border-radius:20px;">
            等待數據載入...
        </div>
    </div>

    <div class="section" style="border:none">
        <div style="font-weight:700; margin-bottom:12px">業主核准簽章：</div>
        <canvas id="sig-canvas"></canvas>
    </div>

    <div class="btn-group">
        <button class="btn btn-clear" onclick="clearSig()">清除簽名</button>
        <button class="btn btn-pdf" onclick="generatePDF()">產出正式 PDF 報價單</button>
    </div>
</div>

<script>
    let config = null;


    // 暫時將 loadPricing 函數註解掉，改用這段內置數據進行本地測試
const config = {
    "labor_tiers": [
        { "min_hours": 1, "max_hours": 3, "rate_per_hour": 700 },
        { "min_hours": 4, "max_hours": 7, "rate_per_hour": 600 },
        { "min_hours": 8, "max_hours": 999, "rate_per_hour": 550 }
    ],
    "materials": [
        { "name": "深度廚房", "price": 200 },
        { "name": "深度浴廁", "price": 100 },
        { "name": "裝修藥劑", "price": 500 },
        { "name": "石材保護", "price": 1000 }
    ],
    "equipment": [
        { "name": "沙發清洗機", "price": 2500 },
        { "name": "床墊除蟎機", "price": 2000 },
        { "name": "工業吸塵器", "price": 400 }
    ]
};

// 然後在 script 最後面直接呼叫 initApp()，不要呼叫 loadPricing()
initApp();

    function initApp() {
        document.getElementById('current-time').innerText = `報價時間：${new Date().toLocaleString()}`;
        
        const render = (data, id) => {
            const container = document.getElementById(id);
            if (!data) return;
            container.innerHTML = data.map(item => `
                <div class="option-item" onclick="toggleOption(this)">
                    <span class="option-name">${item.name}</span>
                    <span class="option-price">+$<span class="price-val">${item.price}</span></span>
                </div>`).join('');
        };

        render(config.materials, 'mat-grid');
        render(config.equipment, 'equip-grid');
        calculate();
    }

    function toggleOption(el) { el.classList.toggle('active'); calculate(); }

    function calculate() {
        if (!config) return;

        const hrs = parseFloat(document.getElementById('hours-slider').value);
        document.getElementById('hr-val').innerText = hrs;
        
        // 階梯時薪
        const tier = config.labor_tiers.find(t => hrs >= t.min_hours && hrs <= t.max_hours);
        const rate = tier ? tier.rate_per_hour : 600;
        document.getElementById('rate-note').innerText = `單價：$${rate}/hr`;

        const freq = parseFloat(document.getElementById('freq').value);
        let total = hrs * rate * freq;

        // 加總選中項
        document.querySelectorAll('.option-item.active .price-val').forEach(span => {
            total += parseInt(span.innerText);
        });

        // 加總追加項
        const extra = parseInt(document.getElementById('extra-price').value) || 0;
        total += extra;

        document.getElementById('total-price').innerText = `$${Math.round(total).toLocaleString()}`;
    }

    // 簽名功能
    const canvas = document.getElementById('sig-canvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    const getPos = (e) => {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - rect.left, y: clientY - rect.top };
    };

    const start = (e) => { drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); e.preventDefault(); };
    const move = (e) => { if (!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.lineWidth = 3; ctx.stroke(); e.preventDefault(); };
    const stop = () => { drawing = false; };

    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', move);
    window.addEventListener('mouseup', stop);
    canvas.addEventListener('touchstart', start);
    canvas.addEventListener('touchmove', move);
    canvas.addEventListener('touchend', stop);

    function clearSig() { ctx.clearRect(0, 0, canvas.width, canvas.height); }
    function generatePDF() { alert("報價單鎖定！"); }

    // 啟動
    loadPricing();
</script>
</body>
</html>
